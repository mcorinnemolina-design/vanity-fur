<!DOCTYPE html>
<html><head><style>
  body { display: flex; gap: 10px; margin: 0; padding: 0; }
  .hero { width: 400px; height: 800px; position: relative; overflow: hidden; border: 2px solid red;}
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .p60 img { object-position: 60% bottom; }
  .p70 img { object-position: 70% bottom; }
  .p80 img { object-position: 80% bottom; }
</style></head><body>
  <div class="hero p60"><h2>60%</h2><img src="assets/images/miloside1.png"></div>
  <div class="hero p70"><h2>70%</h2><img src="assets/images/miloside1.png"></div>
  <div class="hero p80"><h2>80%</h2><img src="assets/images/miloside1.png"></div>
</body></html>
